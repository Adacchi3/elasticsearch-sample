default: &default
  adapter: mysql2
  encoding: utf8mb4
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host: <%= ENV.fetch("MYSQL_HOST") { "mysql" } %>
  username: root
  password: <%= ENV["MYSQL_ROOT_PASSWORD"] %>

development:
  <<: *default
  database: <%= ENV.fetch("MYSQL_DATABASE") { "elasticsearch_sample_development" } %>

test:
  <<: *default
  database: elasticsearch_sample_test
